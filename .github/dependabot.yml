version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/Prague'
    assignees:
      - 'vreshch'
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/Prague'
    assignees:
      - 'vreshch'
    open-pull-requests-limit: 5
    groups:
      all-actions:
        patterns:
          - '*'
