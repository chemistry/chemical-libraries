name: PR Validation

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'âś… PASSED' : 'âťŚ FAILED';
            const emoji = '${{ job.status }}' === 'success' ? 'đźŽ‰' : 'đź’Ą';

            const body = `${emoji} **PR Validation ${status}**

            **Commit:** \`${{ github.sha }}\`
            **Branch:** \`${{ github.head_ref }}\`

            **Checks:**
            - ${'${{ job.status }}' === 'success' ? 'âś…' : 'âťŚ'} Dependencies installed
            - ${'${{ job.status }}' === 'success' ? 'âś…' : 'âťŚ'} Type check passed
            - ${'${{ job.status }}' === 'success' ? 'âś…' : 'âťŚ'} Linting passed
            - ${'${{ job.status }}' === 'success' ? 'âś…' : 'âťŚ'} Format check passed
            - ${'${{ job.status }}' === 'success' ? 'âś…' : 'âťŚ'} Tests passed
            - ${'${{ job.status }}' === 'success' ? 'âś…' : 'âťŚ'} Build successful

            ${status === 'âś… PASSED' ? '**Ready to merge!** âś¨' : '**Please fix issues before merging.**'}

            ---
            đź”— [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            âŹ° Generated at: \`${new Date().toISOString()}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('PR Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
